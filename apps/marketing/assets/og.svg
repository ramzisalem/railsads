<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F3EF"/>
      <stop offset="100%" stop-color="#ECE9E2"/>
    </linearGradient>
    <radialGradient id="orange" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#FF6A00" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF6A00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sage" cx="85%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#9FB5AE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9FB5AE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#FF8126"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orange)"/>
  <rect width="1200" height="630" fill="url(#sage)"/>

  <!-- Brand -->
  <g transform="translate(96, 96)">
    <rect width="56" height="56" rx="14" fill="url(#mark)"/>
    <rect x="17" y="12" width="4" height="32" rx="2" fill="#fff"/>
    <rect x="35" y="12" width="4" height="32" rx="2" fill="#fff"/>
    <circle cx="28" cy="28" r="3" fill="#fff"/>
    <text x="76" y="38" font-family="Inter, sans-serif" font-size="26" font-weight="600" fill="#1C1C1C">RailsAds</text>
  </g>

  <!-- Headline -->
  <text x="96" y="310" font-family="Playfair Display, serif" font-size="84" font-weight="500" fill="#1C1C1C" letter-spacing="-2.5">
    <tspan x="96" dy="0">Your AI ads creative</tspan>
    <tspan x="96" dy="92" fill="#FF6A00" font-style="italic">strategist.</tspan>
  </text>

  <!-- Subheadline -->
  <text x="96" y="540" font-family="Inter, sans-serif" font-size="26" fill="#6B6B6B" letter-spacing="-0.3">
    Paste your website. Get product-specific creatives in minutes.
  </text>
</svg>
